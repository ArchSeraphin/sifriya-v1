# Dev local uniquement. La production utilise Coolify.
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sifriya
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sifriya
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sifriya -d sifriya"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
